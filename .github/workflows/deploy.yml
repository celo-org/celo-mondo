name: Automatic deployments

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * 1-5' # Runs at 11 am UTC, Monday to Friday

jobs:
  deploy:
    name: Deploy
    runs-on: ['self-hosted', 'org']
    permissions:
      id-token: write
      contents: read
    steps:

      - name: Import Secrets from OpenBao
        id: import-secrets
        uses: hashicorp/vault-action@v3
        with:
          # Your OpenBao URL
          url: https://openbao.akeyless.celo-networks-dev.org
          # Authentication configuration
          method: jwt
          path: github
          role: "celo-org_celo-mondo"
          # Secrets to retrieve: <PATH> <KEY> | <ENV_VAR_NAME>
          secrets: |
            secrets/data/static-secrets/dev-tooling-circle/vercel/celo-mondo_vercel_deploy_hook value | TOKEN_VAR


      - name: Verify Secret Retrieval
        run: |
          if [ -n "${{ env.TOKEN_VAR }}" ]; then
            echo "SUCCESS: TOKEN_VAR retrieved successfully from OpenBao."
          else
            echo "FAIL: TOKEN_VAR is empty. Check OpenBao roles or policy."
            exit 1
          fi

      - name: Trigger Deployment
        if: ${{ false }}
        env:
          DEPLOYMENT_WEBHOOK_URL: ${{ env.TOKEN_VAR }}
        run: |
          curl -s -o /dev/null -X GET "$DEPLOYMENT_WEBHOOK_URL"
